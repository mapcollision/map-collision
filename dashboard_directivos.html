<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAP COLLISION CENTER - Dashboard Directivos</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--naranja:#E8640A;--azul:#1A3A5C;--azul-medio:#2B6CB0;--verde:#276749;--rojo:#C53030;--amarillo:#D69E2E;--gris:#718096;--blanco:#fff;--fondo:#F7F8FA;--borde:#E2E8F0}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{background:var(--fondo);color:#2D3748}
#login-screen{position:fixed;inset:0;background:var(--azul);display:flex;align-items:center;justify-content:center;z-index:999}
.login-card{background:var(--blanco);border-radius:16px;padding:48px 40px;text-align:center;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{width:70px;height:70px;background:var(--naranja);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
.login-title{font-size:20px;font-weight:800;color:var(--azul);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--gris);margin-bottom:8px}
.login-badge{background:#FDE8D8;color:var(--naranja);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:28px}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:1px solid var(--borde);border-radius:8px;background:var(--blanco);cursor:pointer;font-size:14px;font-weight:600;color:#2D3748;transition:all .2s}
.btn-google:hover{background:var(--fondo)}
.btn-google img{width:20px}
#login-error{color:var(--rojo);font-size:12px;margin-top:16px;display:none}
#app{display:none}
.topbar{background:var(--azul);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{color:white;font-size:15px;font-weight:700}
.topbar-title span{color:var(--naranja)}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge-acceso{background:rgba(232,100,10,.2);color:var(--naranja);font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid rgba(232,100,10,.4)}
.user-name{color:#A0B4C8;font-size:13px}
.btn-top{color:white;border:none;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.filtros{background:var(--blanco);border-bottom:1px solid var(--borde);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filtros label{font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase}
.filtros select{border:1px solid var(--borde);border-radius:6px;padding:7px 12px;font-size:13px;color:#2D3748;background:var(--blanco)}
.btn-filtrar{background:var(--naranja);color:white;border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.btn-anual{background:var(--azul);color:white;border:none;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.main{padding:20px 24px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--blanco);border-radius:8px;border:1px solid var(--borde);padding:14px 16px;border-left:4px solid var(--naranja)}
.kpi.verde{border-left-color:var(--verde)}
.kpi.azul{border-left-color:var(--azul-medio)}
.kpi.amarillo{border-left-color:var(--amarillo)}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--gris);margin-bottom:4px}
.kpi-value{font-size:28px;font-weight:800;color:#2D3748;line-height:1}
.kpi-sub{font-size:10px;color:var(--gris);margin-top:3px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--gris);margin:16px 0 10px;border-bottom:2px solid var(--naranja);padding-bottom:4px;display:inline-block}
.areas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.area-card{background:var(--blanco);border-radius:8px;border:1px solid var(--borde);padding:16px;display:flex;align-items:center;gap:14px}
.area-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.area-info{flex:1}
.area-nombre{font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase;margin-bottom:3px}
.area-dias{font-size:24px;font-weight:800;line-height:1}
.area-sub{font-size:9px;color:var(--gris);margin-top:2px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--blanco);border-radius:8px;border:1px solid var(--borde);padding:16px}
.chart-card h4{font-size:12px;font-weight:700;color:var(--azul);margin-bottom:12px}
.loading{text-align:center;padding:60px;color:var(--gris);font-size:14px}
</style>
</head>
<body>

<div id="login-screen">

    <div class="login-logo">&#128664;</div>
    <div class="login-title">MAP COLLISION CENTER</div>
    <div class="login-sub">Dashboard Directivos</div>
    <div class="login-badge">Acceso Restringido</div>

    </button>
    <div id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">

    <div class="topbar-right">
      <span class="badge-acceso">Acceso Restringido</span>

      <button class="btn-top" style="background:var(--naranja)" onclick="cargarDatos()">&#8635; Actualizar</button>
      <button class="btn-top" style="background:rgba(255,255,255,.1)" onclick="cerrarSesion()">Salir</button>

    <label>Periodo:</label>
    <select id="f-mes"></select>
    <label>Clasificacion:</label>
    <select id="f-clasif">
      <option value="">Todas</option>
      <option>Express</option><option>Leve</option><option>Medio</option>
      <option>Fuerte</option><option>Severo</option>
    </select>
    <button class="btn-filtrar" onclick="aplicarFiltros()">Aplicar Filtros</button>
    <div style="width:1px;height:24px;background:var(--borde);margin:0 4px"></div>
    <button class="btn-anual" id="btn-anual" onclick="toggleAnual()">Ver Acumulado Anual</button>
  </div>

  <div class="main" id="main-content">
    <div class="loading">Cargando datos...</div>
  </div>
</div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRMNDZ0p4YOgoyjqFqYrZt5mAEBx2x5k6_Pb51LGFfxNrZtqlh0u2NccSKAIHJVhfGAw/exec';
var SHEET_ID = '1T_XuXIOAygibq396oM2XOC_JDReN0sGj5nwJ-gUs-lE';
var CLIENT_ID = '219469945932-4b97uq84bh6b2hfq4ohfs2a4nl85ga35.apps.googleusercontent.com';
var SCOPES = 'https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';
var CORREOS = ['cooper.rob.six@gmail.com','adriana.nafarrate.map@gmail.com','michelforsythmap@gmail.com'];

var accessToken = null, tokenClient = null;
var dbData = [], usuarioActual = '';
var filtroMes = null, filtroAnio = null, filtroClasif = '';
var mostrandoAnual = false;
var chartInstances = {};

var IDX = {
  noOrden:0,asesor:1,valuador:2,fechaIngreso:3,deducible:4,tipoCliente:5,
  tipoUnidad:6,color:7,placas:8,fechaReingreso:9,observaciones:10,noSiniestro:11,
  statusVal:12,valuacion:13,fechaPresup:14,fechaValFinal:15,montoPrevio:16,
  complemento:17,moHojalatero:18,moMecanica:19,moPintura:20,materiales:21,
  refaccionesV:22,subtotal:23,noPiezas:24,clasificacion:25,costoMeta:26,
  fechaEntregaCalc:27,fechaIniRef:28,fechaFinRef:29,noRefValuacion:30,
  pedidoImpart:31,tot:32,comentarioRef:33,statusRef:34,pzSurtidas:35,
  pzSalvadas:36,comentarioPzSalvamento:37,totalPiezas:38,ubicacionUnidad:39,
  inicioRep:40,tecHojalatero:41,prepPintura:42,tecPintor:43,tecMecanico:44,
  tecArmado:45,tecPulido:46,pHojalateria:47,pMecanica:48,pPrepPintura:49,
  pPintura:50,pArmado:51,pPulido:52,pTot:53,trabajoTerminado:54,
  statusTaller:55,fechaEntrega:56
};

function parseDate(str) {
  if (!str) return null;
  var s = String(str).trim();
  if (!s || s === '0' || s === 'null' || s === 'undefined') return null;

  // Numero serial de Google Sheets
  var num = parseFloat(s);
  if (!isNaN(num) && !s.includes('/') && !s.includes('-') && num > 40000 && num < 60000) {
    var base = new Date(1899,11,30);
    base.setDate(base.getDate() + Math.floor(num));
    return base;
  }

  // Formato DD/MM/YYYY — formato exacto que devuelve el Apps Script
  if (s.includes('/')) {
    var p = s.split('/');
    if (p.length === 3) {
      var dd=parseInt(p[0]), mm=parseInt(p[1]), yyyy=parseInt(p[2]);
      if (yyyy > 1900 && mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31) {
        return new Date(yyyy, mm-1, dd);
      }
    }
  }

  // Formato YYYY-MM-DD
  if (s.includes('-') && s.length === 10) {
    var pp = s.split('-');
    var yy=parseInt(pp[0]), m2=parseInt(pp[1]), d2=parseInt(pp[2]);
    if (yy > 1900 && m2 >= 1 && m2 <= 12 && d2 >= 1 && d2 <= 31) {
      return new Date(yy, m2-1, d2);
    }
  }

  return null;
}

function getF(row, idx) {
  if (!row || idx >= row.length) return '';
  var v = row[idx];
  return (v === null || v === undefined) ? '' : v;
}

function avg(arr) {
  if (!arr.length) return 'N/A';
  return (arr.reduce(function(a,b){return a+b;},0)/arr.length).toFixed(1);
}

// LOGIN
function iniciarSesion() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: function(resp) {
      if (resp.error) { mostrarError('Error al iniciar sesion'); return; }
      accessToken = resp.access_token;
      verificarAcceso();
    }
  });
  tokenClient.requestAccessToken({prompt:'select_account'});
}

function verificarAcceso() {
  fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}})
    .then(function(r){return r.json();})
    .then(function(info){
      var email = (info.email||'').toLowerCase().trim();
      if (CORREOS.indexOf(email) < 0) {
        mostrarError('Acceso denegado. Tu cuenta ('+email+') no tiene permiso.');
        accessToken = null; return;
      }
      usuarioActual = info.name || info.email;
      document.getElementById('user-name').textContent = usuarioActual;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      cargarDatos();
    }).catch(function(){ mostrarError('Error verificando cuenta. Intenta de nuevo.'); });
}

function mostrarError(msg) {
  var el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.color = '#C53030';
  el.style.marginTop = '16px';
  el.style.fontSize = '12px';
}

function cerrarSesion() {
  accessToken = null; dbData = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-error').style.display = 'none';
}

// DATOS
async function cargarDatos() {
  document.getElementById('main-content').innerHTML = '<div class="loading">Cargando datos...</div>';
  try {
    var rows = [];
    if (APPS_SCRIPT_URL) {
      var r = await fetch(APPS_SCRIPT_URL + '?action=getData');
      var result = await r.json();
      rows = result.values || [];
    } else {
      var r2 = await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/\'Base%20de%20Datos\'!A:BF',
        {headers:{Authorization:'Bearer '+accessToken}});
      rows = (await r2.json()).values || [];
    }
    if (rows.length > 1) {
      dbData = rows.slice(1).map(function(row){
        while(row.length < 57) row.push('');
        return row;
      });
    }
    // Debug: ver formato de fechas
    if (dbData.length > 0) {
      console.log('Total filas BD:', dbData.length);
      console.log('Muestra fecha ingreso fila 1:', dbData[0][IDX.fechaIngreso]);
      console.log('Muestra fecha ingreso fila 2:', dbData[1] ? dbData[1][IDX.fechaIngreso] : 'N/A');
      var testDate = parseDate(String(dbData[0][IDX.fechaIngreso]));
      console.log('parseDate resultado:', testDate ? testDate.toISOString() : 'null');
    }
    poblarFiltroMes();
    renderDashboard();
  } catch(e) {
    document.getElementById('main-content').innerHTML = '<div class="loading">Error cargando datos: '+e.message+'</div>';
  }
}

function poblarFiltroMes() {
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var vistos = {};
  var hoyRef = new Date();
  
  dbData.forEach(function(r){
    var fi = parseDate(String(getF(r,IDX.fechaIngreso)));
    // Solo incluir fechas validas y no futuras (evitar años incorrectos)
    if (fi && fi.getFullYear() >= 2020 && fi <= hoyRef) {
      var k = fi.getFullYear()+'-'+String(fi.getMonth()).padStart(2,'0');
      vistos[k] = {anio:fi.getFullYear(),mes:fi.getMonth(),label:meses[fi.getMonth()]+' '+fi.getFullYear()};
    }
  });
  
  var keys = Object.keys(vistos).sort().reverse();
  var sel = document.getElementById('f-mes');
  sel.innerHTML = '';
  keys.forEach(function(k){
    var o = document.createElement('option');
    o.value = k; o.textContent = vistos[k].label;
    sel.appendChild(o);
  });
  
  // Default: mes actual
  var hoy = new Date();
  filtroMes = hoy.getMonth();
  filtroAnio = hoy.getFullYear();
  
  // Buscar si existe el mes actual en las opciones
  var keyActual = filtroAnio+'-'+String(filtroMes).padStart(2,'0');
  if (vistos[keyActual]) {
    sel.value = keyActual;
  } else if (keys.length > 0) {
    // Usar el mes mas reciente disponible
    var first = vistos[keys[0]];
    filtroMes = first.mes;
    filtroAnio = first.anio;
    sel.value = keys[0];
  }
}

function aplicarFiltros() {
  var sel = document.getElementById('f-mes');
  if (sel.value) {
    var parts = sel.value.split('-');
    filtroAnio = parseInt(parts[0]);
    filtroMes = parseInt(parts[1]);
  }
  filtroClasif = document.getElementById('f-clasif').value;
  renderDashboard();
}

function toggleAnual() {
  mostrandoAnual = !mostrandoAnual;
  var btn = document.getElementById('btn-anual');
  btn.textContent = mostrandoAnual ? 'Ocultar Acumulado Anual' : 'Ver Acumulado Anual';
  btn.style.background = mostrandoAnual ? '#C53030' : 'var(--azul)';
  renderDashboard();
}

function mkChart(id, config) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  var el = document.getElementById(id);
  if (el) chartInstances[id] = new Chart(el, config);
}

var barLabel = {
  id:'barLabel',
  afterDatasetsDraw:function(chart){
    var ctx=chart.ctx;
    chart.data.datasets.forEach(function(ds,i){
      chart.getDatasetMeta(i).data.forEach(function(bar,j){
        var val=ds.data[j]; if(!val) return;
        ctx.save(); ctx.fillStyle='#2D3748'; ctx.font='bold 9px Segoe UI';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        // Verificar que el numero no se salga del canvas
        var y = Math.max(bar.y-2, 12);
        ctx.fillText(val,bar.x,y); ctx.restore();
      });
    });
  }
};

var legOpts = {position:'bottom',labels:{font:{size:9},padding:6,boxWidth:10}};
var scOpts = {
  x:{ticks:{font:{size:8},maxRotation:0},grid:{display:false}},
  y:{beginAtZero:true,ticks:{font:{size:9}},grace:'15%'}
};

function renderDashboard() {
  if (filtroMes === null) return;
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var clasifs = ['Express','Leve','Medio','Fuerte','Severo'];

  // Filtrar ordenes del mes por fecha ingreso
  var rowsMes = dbData.filter(function(r){
    if (!getF(r,IDX.noOrden)) return false;
    var fi = parseDate(String(getF(r,IDX.fechaIngreso)));
    if (!fi || fi.getMonth()!==filtroMes || fi.getFullYear()!==filtroAnio) return false;
    if (filtroClasif && getF(r,IDX.clasificacion)!==filtroClasif) return false;
    return true;
  });

  // Debug rowsMes
  console.log('filtroMes:',filtroMes,'filtroAnio:',filtroAnio);
  console.log('rowsMes total:',rowsMes.length);
  // Mostrar primeras 3 fechas de BD para ver formato
  for(var dbg=0;dbg<Math.min(3,dbData.length);dbg++){
    var fdbg=String(getF(dbData[dbg],IDX.fechaIngreso));
    var pdbg=parseDate(fdbg);
    console.log('BD['+dbg+'] fecha:',fdbg,'-> mes:',pdbg?pdbg.getMonth():'null','anio:',pdbg?pdbg.getFullYear():'null');
  }

  // Entregadas del mes por fecha entrega
  var entregadasMes = dbData.filter(function(r){
    if (!getF(r,IDX.noOrden)) return false;
    var fe = parseDate(String(getF(r,IDX.fechaEntrega)));
    var st = String(getF(r,IDX.statusTaller)||'').toLowerCase();
    return (st==='entregado') && fe && fe.getMonth()===filtroMes && fe.getFullYear()===filtroAnio;
  });

  // En tiempo / retraso — TODAS las ordenes activas (igual que app principal)
  var enTiempo=0, conRetraso=0;
  dbData.forEach(function(r){
    if (!getF(r,IDX.noOrden)) return;
    var st = String(getF(r,IDX.statusTaller)||'').toLowerCase();
    if (st==='entregado'||st==='cancelado') return;
    var fe = parseDate(String(getF(r,IDX.fechaEntregaCalc)||''));
    if (!fe||isNaN(fe.getTime())) return;
    if (Math.round((fe-hoy)/86400000)<0) conRetraso++;
    else enTiempo++;
  });

  // Tiempo promedio entrega
  var diasArr=[];
  entregadasMes.forEach(function(r){
    var fe=parseDate(String(getF(r,IDX.fechaEntrega)));
    var fi=parseDate(String(getF(r,IDX.fechaIngreso)));
    if(fe&&fi) diasArr.push(Math.round((fe-fi)/86400000));
  });
  var promDias = diasArr.length ? Math.round(diasArr.reduce(function(a,b){return a+b;},0)/diasArr.length) : 0;
  var cumplimiento = (enTiempo+conRetraso)>0 ? Math.round(enTiempo/(enTiempo+conRetraso)*100) : 0;

  // Tiempos por area — SOLO ordenes del mes seleccionado
  var valArr=[], refArr=[], tallArr=[];
  rowsMes.forEach(function(r){
    var fi=parseDate(String(getF(r,IDX.fechaIngreso)));
    var fvf=parseDate(String(getF(r,IDX.fechaValFinal)));
    var fir=parseDate(String(getF(r,IDX.fechaIniRef)));
    var ffr=parseDate(String(getF(r,IDX.fechaFinRef)));
    var fe=parseDate(String(getF(r,IDX.fechaEntrega)));
    if(fi&&fvf&&fvf>fi) valArr.push(Math.round((fvf-fi)/86400000));
    if(fir&&ffr&&ffr>fir) refArr.push(Math.round((ffr-fir)/86400000));
    if(ffr&&fe&&fe>ffr) tallArr.push(Math.round((fe-ffr)/86400000));
  });

  // Conteo del mes por clasificacion (para grafica de conteo)
  var countCl=[], sinClasif=0;
  clasifs.forEach(function(cl){
    var sub=rowsMes.filter(function(r){
      if(!getF(r,IDX.noOrden))return false;
      return String(getF(r,IDX.clasificacion)||'').trim()===cl;
    });
    countCl.push(sub.length);
  });
  rowsMes.forEach(function(r){
    var cl=String(getF(r,IDX.clasificacion)||'').trim();
    if(!cl) sinClasif++;
  });

  // En tiempo vs fuera por clasificacion - usando TODAS las activas
  var etCl=[], crCl=[];
  clasifs.forEach(function(cl){
    var sub=dbData.filter(function(r){
      if(!getF(r,IDX.noOrden))return false;
      var st=String(getF(r,IDX.statusTaller)||'').toLowerCase();
      if(st==='entregado'||st==='cancelado')return false;
      return String(getF(r,IDX.clasificacion)||'').trim()===cl;
    });
    var et=0,cr=0;
    sub.forEach(function(r){
      var fe=parseDate(String(getF(r,IDX.fechaEntregaCalc)||''));
      if(!fe)return;
      if(Math.round((fe-hoy)/86400000)<0)cr++;else et++;
    });
    etCl.push(et); crCl.push(cr);
  });
  console.log('etCl:',etCl,'crCl:',crCl);

  // % por clasificacion para anillo
  var totalCl=countCl.reduce(function(a,b){return a+b;},0);
  var pctsCl=countCl.map(function(c){return totalCl>0?Math.round(c/totalCl*100):0;});

  // % en tiempo vs retraso por clasificacion
  var pctEtCl=[], pctCrCl=[];
  clasifs.forEach(function(cl,i){
    var tot=etCl[i]+crCl[i];
    pctEtCl.push(tot>0?Math.round(etCl[i]/tot*100):0);
    pctCrCl.push(tot>0?Math.round(crCl[i]/tot*100):0);
  });

  // Semanas del mes - solo hasta hoy
  var semLabels=[], semNuevas=[], semEntregadas=[];
  var pDia=new Date(filtroAnio,filtroMes,1), uDia=new Date(filtroAnio,filtroMes+1,0);
  // Si es el mes actual, solo mostrar hasta hoy
  if(filtroMes===hoy.getMonth() && filtroAnio===hoy.getFullYear()){
    if(uDia>hoy) uDia=new Date(hoy);
  }
  var sStart=new Date(pDia), sNum=1;
  while(sStart<=uDia){
    var sEnd=new Date(sStart); sEnd.setDate(sStart.getDate()+6);
    if(sEnd>uDia) sEnd=new Date(uDia);
    semLabels.push('Sem '+sNum+' ('+sStart.getDate()+'-'+sEnd.getDate()+')');
    var nv=0,en=0;
    // Nuevas: fecha ingreso en la semana
    dbData.forEach(function(r){
      if(!getF(r,IDX.noOrden)) return;
      var fi=parseDate(String(getF(r,IDX.fechaIngreso)));
      if(fi&&fi>=sStart&&fi<=sEnd) nv++;
      // Entregadas: fecha entrega en la semana
      var fe=parseDate(String(getF(r,IDX.fechaEntrega)));
      var st=String(getF(r,IDX.statusTaller)||'').toLowerCase();
      if(fe&&fe>=sStart&&fe<=sEnd&&st==='entregado') en++;
    });
    semNuevas.push(nv); semEntregadas.push(en);
    sStart.setDate(sStart.getDate()+7); sNum++;
  }

  // Conteo por tipo cliente — usando tipoCliente (col F) del mes
  var gnp=0, part=0, cancelados=0;
  rowsMes.forEach(function(r){
    if(!getF(r,IDX.noOrden))return;
    var tc=String(getF(r,IDX.tipoCliente)||'').trim().toLowerCase();
    var val=String(getF(r,IDX.valuacion)||'').trim().toLowerCase();
    var st=String(getF(r,IDX.statusTaller)||'').trim().toLowerCase();
    console.log('Orden:',getF(r,IDX.noOrden),'tipoCliente:',tc,'val:',val,'st:',st);
    if(st==='cancelado') cancelados++;
    else if(tc==='gnp'||val==='gnp') gnp++;
    else if(tc==='particular'||val==='particular') part++;
  });
  var totVal=gnp+part+cancelados;
  var pctGnp=totVal>0?Math.round(gnp/totVal*100):0;
  var pctPart=totVal>0?Math.round(part/totVal*100):0;
  var pctCan=totVal>0?Math.round(cancelados/totVal*100):0;

  // Anual
  var anualLabels=[], anualNuevas=[], anualEntregadas=[];
  var totAnualNuevas=0, totAnualEntregadas=0;
  for(var mx=0;mx<=filtroMes;mx++){
    anualLabels.push(meses[mx].substring(0,3));
    var rN=dbData.filter(function(r){var fi=parseDate(String(getF(r,IDX.fechaIngreso)));return fi&&fi.getMonth()===mx&&fi.getFullYear()===filtroAnio;}).length;
    var rE=dbData.filter(function(r){var fe=parseDate(String(getF(r,IDX.fechaEntrega)));return String(getF(r,IDX.statusTaller)||'').toLowerCase()==='entregado'&&fe&&fe.getMonth()===mx&&fe.getFullYear()===filtroAnio;}).length;
    anualNuevas.push(rN); anualEntregadas.push(rE);
    totAnualNuevas+=rN; totAnualEntregadas+=rE;
  }

  var pctT=enTiempo+conRetraso>0?Math.round(enTiempo/(enTiempo+conRetraso)*100):0;
  var pctR=100-pctT;

  // RENDER HTML
  document.getElementById('main-content').innerHTML =
    '<div class="kpis">'+
      '<div class="kpi"><div class="kpi-label">Ordenes Nuevas</div><div class="kpi-value">'+rowsMes.length+'</div><div class="kpi-sub">'+meses[filtroMes]+' '+filtroAnio+'</div></div>'+
      '<div class="kpi verde"><div class="kpi-label">Entregadas</div><div class="kpi-value">'+entregadasMes.length+'</div><div class="kpi-sub">'+(rowsMes.length>0?Math.round(entregadasMes.length/rowsMes.length*100):0)+'% de las nuevas</div></div>'+
      '<div class="kpi azul"><div class="kpi-label">Tiempo Prom. Entrega</div><div class="kpi-value">'+promDias+'d</div><div class="kpi-sub">Meta: 20 dias</div></div>'+
      '<div class="kpi amarillo"><div class="kpi-label">Cumplimiento Fechas</div><div class="kpi-value">'+cumplimiento+'%</div><div class="kpi-sub">Meta: 85%</div></div>'+
    '</div>'+

    (mostrandoAnual?
      '<div style="margin-bottom:20px">'+
      '<div class="section-title">Acumulado Anual '+filtroAnio+'</div>'+
      '<div class="kpis">'+
        '<div class="kpi"><div class="kpi-label">Total Ordenes</div><div class="kpi-value">'+totAnualNuevas+'</div><div class="kpi-sub">Ene - '+meses[filtroMes]+' '+filtroAnio+'</div></div>'+
        '<div class="kpi verde"><div class="kpi-label">Total Entregadas</div><div class="kpi-value">'+totAnualEntregadas+'</div><div class="kpi-sub">'+(totAnualNuevas>0?Math.round(totAnualEntregadas/totAnualNuevas*100):0)+'% del total</div></div>'+
        '<div class="kpi azul"><div class="kpi-label">En Tiempo (activas)</div><div class="kpi-value">'+enTiempo+'</div><div class="kpi-sub">Ordenes activas</div></div>'+
        '<div class="kpi amarillo"><div class="kpi-label">Cumplimiento Anual</div><div class="kpi-value">'+cumplimiento+'%</div><div class="kpi-sub">Meta: 85%</div></div>'+
      '</div>'+
      '<div class="chart-card" style="margin-bottom:16px"><h4>Ordenes Nuevas vs Entregadas — Acumulado '+filtroAnio+'</h4><canvas id="c-anual" style="max-height:160px"></canvas></div>'+
      '</div>'
    :'')+

    '<div class="section-title">Tiempo Promedio por Area</div>'+
    '<div class="areas-grid">'+
      '<div class="area-card"><div class="area-icon" style="background:#FDE8D8">&#128203;</div><div class="area-info"><div class="area-nombre">Valuacion</div><div class="area-dias" style="color:var(--amarillo)">'+avg(valArr)+' dias</div><div class="area-sub">Desde fecha ingreso hasta fecha val. final</div></div></div>'+
      '<div class="area-card"><div class="area-icon" style="background:#EBF4FF">&#128295;</div><div class="area-info"><div class="area-nombre">Refacciones</div><div class="area-dias" style="color:var(--rojo)">'+avg(refArr)+' dias</div><div class="area-sub">Desde fecha ini. ref. hasta fecha fin ref.</div></div></div>'+
      '<div class="area-card"><div class="area-icon" style="background:#F0FFF4">&#127981;</div><div class="area-info"><div class="area-nombre">Taller (promedio)</div><div class="area-dias" style="color:var(--azul-medio)">'+avg(tallArr)+' dias</div><div class="area-sub">Desde fecha fin ref. hasta fecha de entrega</div></div></div>'+
    '</div>'+

    '<div class="charts-row">'+
      '<div class="chart-card"><h4>En Tiempo vs Fuera de Tiempo (ordenes activas)</h4><canvas id="c1" style="max-height:200px"></canvas></div>'+
      '<div class="chart-card"><h4>Conteo de Siniestros por Clasificacion</h4><canvas id="c2" style="max-height:200px"></canvas></div>'+
    '</div>'+
    '<div class="charts-row">'+
      '<div class="chart-card"><h4>En Tiempo vs Fuera de Tiempo por Clasificacion (%)</h4><canvas id="c3" style="max-height:200px"></canvas></div>'+
      '<div class="chart-card"><h4>Entradas vs Entregados por Semana — '+meses[filtroMes]+' '+filtroAnio+'</h4><canvas id="c4" style="max-height:200px"></canvas></div>'+
    '</div>'+
    '<div class="charts-row">'+
      '<div class="chart-card"><h4>Conteo por Tipo — GNP, Particular y Cancelados</h4><canvas id="c5" style="max-height:200px"></canvas></div>'+
      '<div class="chart-card" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px">'+
        '<div style="font-size:11px;color:var(--gris);font-weight:700;text-transform:uppercase;margin-bottom:8px">Resumen Activas</div>'+
        '<div style="font-size:48px;font-weight:800;color:var(--verde)">'+enTiempo+'</div>'+
        '<div style="font-size:12px;color:var(--verde);font-weight:600">En Tiempo</div>'+
        '<div style="font-size:36px;font-weight:800;color:var(--rojo);margin-top:12px">'+conRetraso+'</div>'+
        '<div style="font-size:12px;color:var(--rojo);font-weight:600">Fuera de Tiempo</div>'+
      '</div>'+
    '</div>';

  // GRAFICAS
  if (mostrandoAnual) {
    mkChart('c-anual',{type:'bar',plugins:[barLabel],
      data:{labels:anualLabels,datasets:[
        {label:'Nuevas',data:anualNuevas,backgroundColor:'#2B6CB0',borderRadius:3},
        {label:'Entregadas',data:anualEntregadas,backgroundColor:'#276749',borderRadius:3}
      ]},
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:legOpts},scales:{x:{ticks:{font:{size:8},maxRotation:0},grid:{display:false}},y:{beginAtZero:true,ticks:{font:{size:9}},grace:'15%'}}}
    });
  }

  // Anillo en tiempo vs fuera
  mkChart('c1',{type:'doughnut',
    data:{labels:['En Tiempo ('+pctT+'%)','Fuera de Tiempo ('+pctR+'%)'],
      datasets:[{data:[enTiempo,conRetraso],backgroundColor:['#276749','#C53030'],borderWidth:3,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:8,boxWidth:12}}},cutout:'60%'}
  });

  // Barras siniestros por clasificacion (incluyendo sin clasificar)
  var labelsC2 = clasifs.map(function(c,i){return c+' ('+pctsCl[i]+'%)'});
  var dataC2 = countCl.slice();
  var colorsC2 = ['#276749','#2B6CB0','#E8640A','#D69E2E','#C53030'];
  if(sinClasif>0){
    labelsC2.push('Sin Clasif ('+( totalCl>0?Math.round(sinClasif/(totalCl+sinClasif)*100):0 )+'%)');
    dataC2.push(sinClasif);
    colorsC2.push('#718096');
  }
  mkChart('c2',{type:'bar',plugins:[barLabel],
    data:{labels:labelsC2,
      datasets:[{label:'Siniestros',data:dataC2,backgroundColor:colorsC2,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false}},scales:scOpts}
  });

  // Labels con % para c3
  var labelsC3 = clasifs.map(function(cl,i){
    var tot=etCl[i]+crCl[i];
    return cl+(tot>0?' ('+tot+')':'');
  });
  // Plugin % en tope de barras
  var pctLabel = {
    id:'pctLabel',
    afterDatasetsDraw:function(chart){
      var ctx=chart.ctx;
      chart.data.datasets.forEach(function(ds,i){
        chart.getDatasetMeta(i).data.forEach(function(bar,j){
          var val=ds.data[j]; if(!val) return;
          ctx.save(); ctx.fillStyle='#2D3748'; ctx.font='bold 9px Segoe UI';
          ctx.textAlign='center'; ctx.textBaseline='bottom';
          ctx.fillText(val+'%',bar.x,bar.y-2); ctx.restore();
        });
      });
    }
  };
  mkChart('c3',{type:'bar',plugins:[pctLabel],
    data:{labels:labelsC3,datasets:[
      {label:'En Tiempo %',data:pctEtCl,backgroundColor:'#276749',borderRadius:3},
      {label:'Fuera de Tiempo %',data:pctCrCl,backgroundColor:'#C53030',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:legOpts},
      scales:{x:{ticks:{font:{size:9}},grid:{display:false}},
        y:{beginAtZero:true,max:100,ticks:{font:{size:9},callback:function(v){return v+'%';}}}}}
  });

  // Barras semana nuevas vs entregadas
  mkChart('c4',{type:'bar',plugins:[barLabel],
    data:{labels:semLabels,datasets:[
      {label:'Nuevas',data:semNuevas,backgroundColor:'#2B6CB0',borderRadius:3},
      {label:'Entregadas',data:semEntregadas,backgroundColor:'#276749',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:legOpts},scales:{x:{ticks:{font:{size:8},maxRotation:0},grid:{display:false}},y:{beginAtZero:true,ticks:{font:{size:9}},grace:'15%'}}}
  });

  // Barras GNP, Particular, Cancelados
  mkChart('c5',{type:'bar',plugins:[barLabel],
    data:{
      labels:['GNP ('+pctGnp+'%)','Particular ('+pctPart+'%)','Cancelados ('+pctCan+'%)'],
      datasets:[{label:'Ordenes',data:[gnp,part,cancelados],
        backgroundColor:['#2B6CB0','#276749','#C53030'],borderRadius:4}]
    },
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false}},scales:scOpts}
  });
}
</script>
</body>
</html>
