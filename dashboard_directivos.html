<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAP COLLISION CENTER - Dashboard Directivos</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--naranja:#E8640A;--azul:#1A3A5C;--azul-medio:#2B6CB0;--verde:#276749;--rojo:#C53030;--amarillo:#D69E2E;--gris:#718096;--blanco:#fff;--fondo:#F7F8FA;--borde:#E2E8F0}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{background:var(--fondo);color:#2D3748}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--azul);display:flex;align-items:center;justify-content:center;z-index:999}
.login-card{background:var(--blanco);border-radius:16px;padding:48px 40px;text-align:center;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{width:70px;height:70px;background:var(--naranja);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
.login-title{font-size:20px;font-weight:800;color:var(--azul);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--gris);margin-bottom:8px}
.login-badge{background:#FDE8D8;color:var(--naranja);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:28px}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:1px solid var(--borde);border-radius:8px;background:var(--blanco);cursor:pointer;font-size:14px;font-weight:600;color:#2D3748;transition:all .2s}
.btn-google:hover{background:var(--fondo);border-color:var(--azul-medio)}
.btn-google img{width:20px}
#login-error{color:var(--rojo);font-size:12px;margin-top:16px;display:none}

/* APP */
#app{display:none}
.topbar{background:var(--azul);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{color:white;font-size:15px;font-weight:700}
.topbar-title span{color:var(--naranja)}
.topbar-right{display:flex;align-items:center;gap:12px}
.badge-acceso{background:rgba(232,100,10,.2);color:var(--naranja);font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid rgba(232,100,10,.4)}
.user-name{color:#A0B4C8;font-size:13px}
.btn-logout{background:rgba(255,255,255,.1);color:white;border:none;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer}

.filtros{background:var(--blanco);border-bottom:1px solid var(--borde);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filtros label{font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase}
.filtros select{border:1px solid var(--borde);border-radius:6px;padding:7px 12px;font-size:13px;color:#2D3748;background:var(--blanco)}
.btn-filtrar{background:var(--naranja);color:white;border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.btn-anual{background:var(--azul);color:white;border:none;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}

.main{padding:20px 24px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--blanco);border-radius:8px;border:1px solid var(--borde);padding:14px 16px;border-left:4px solid var(--naranja)}
.kpi.verde{border-left-color:var(--verde)}
.kpi.azul{border-left-color:var(--azul-medio)}
.kpi.amarillo{border-left-color:var(--amarillo)}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--gris);margin-bottom:4px}
.kpi-value{font-size:28px;font-weight:800;color:#2D3748;line-height:1}
.kpi-sub{font-size:10px;color:var(--gris);margin-top:3px}
.kpi-comp{font-size:10px;margin-top:4px;font-weight:600}
.comp-up{color:var(--verde)}
.comp-down{color:var(--rojo)}
.comp-neutral{color:var(--gris)}

.section-title{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--gris);margin:16px 0 10px;border-bottom:2px solid var(--naranja);padding-bottom:4px;display:inline-block}
.areas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.area-card{background:var(--blanco);border-radius:8px;border:1px solid var(--borde);padding:16px;display:flex;align-items:center;gap:14px}
.area-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.area-info{flex:1}
.area-nombre{font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase;margin-bottom:3px}
.area-dias{font-size:24px;font-weight:800;line-height:1}
.area-sub{font-size:9px;color:var(--gris);margin-top:2px}
.area-bar-wrap{height:5px;background:var(--borde);border-radius:3px;margin-top:8px}
.area-bar-fill{height:5px;border-radius:3px}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--blanco);border-radius:8px;border:1px solid var(--borde);padding:16px}
.chart-card h4{font-size:12px;font-weight:700;color:var(--azul);margin-bottom:12px}

.loading{text-align:center;padding:60px;color:var(--gris);font-size:14px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">&#128664;</div>

</div>

<!-- APP -->

  <div class="topbar">

</div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3yhvE4kUNXf0CTEXu1AbI-UypasTvVpB5Uo2lPU9yS6ugfFwSoxd9gQU9vv6G-dXzzw/exec';
var SHEET_ID = '1T_XuXIOAygibq396oM2XOC_JDReN0sGj5nwJ-gUs-lE';
var CLIENT_ID = '219469945932-4b97uq84bh6b2hfq4ohfs2a4nl85ga35.apps.googleusercontent.com';
var SCOPES = 'https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';

var CORREOS_PERMITIDOS = [
  'cooper.rob.six@gmail.com',
  'adriana.nafarrate.map@gmail.com',
  'michelforsythmap@gmail.com'
];

var accessToken = null;
var tokenClient = null;
var dbData = [];
var usuarioActual = '';
var filtroMes = null;
var filtroAnio = null;
var filtroClasif = '';
var mostrandoAnual = false;

var chartInstances = {};

var IDX = {
  noOrden:0,asesor:1,valuador:2,fechaIngreso:3,deducible:4,tipoCliente:5,
  tipoUnidad:6,color:7,placas:8,fechaReingreso:9,observaciones:10,noSiniestro:11,
  statusVal:12,valuacion:13,fechaPresup:14,fechaValFinal:15,montoPrevio:16,
  complemento:17,moHojalatero:18,moMecanica:19,moPintura:20,materiales:21,
  refaccionesV:22,subtotal:23,noPiezas:24,clasificacion:25,costoMeta:26,
  fechaEntregaCalc:27,fechaIniRef:28,fechaFinRef:29,noRefValuacion:30,
  pedidoImpart:31,tot:32,comentarioRef:33,statusRef:34,pzSurtidas:35,
  pzSalvadas:36,comentarioPzSalvamento:37,totalPiezas:38,ubicacionUnidad:39,
  inicioRep:40,tecHojalatero:41,prepPintura:42,tecPintor:43,tecMecanico:44,
  tecArmado:45,tecPulido:46,pHojalateria:47,pMecanica:48,pPrepPintura:49,
  pPintura:50,pArmado:51,pPulido:52,pTot:53,trabajoTerminado:54,
  statusTaller:55,fechaEntrega:56
};

function parseDate(str) {
  if (!str) return null;
  var s = String(str).trim();
  if (!s) return null;
  if (s.includes('/')) {
    var p = s.split('/');
    if (p.length === 3) {
      var a = parseInt(p[0]), b = parseInt(p[1]), c = parseInt(p[2]);
      if (c > 1900) return new Date(c, b-1, a);
      if (a > 1900) return new Date(a, b-1, c);
    }
  }
  if (s.includes('-') && s.length === 10) {
    var pp = s.split('-');
    return new Date(parseInt(pp[0]), parseInt(pp[1])-1, parseInt(pp[2]));
  }
  return null;
}

function getField(row, idx) {
  if (!row || idx >= row.length) return '';
  return row[idx] !== null && row[idx] !== undefined ? row[idx] : '';
}

// LOGIN
function iniciarSesion() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: function(resp) {
      if (resp.error) { mostrarError('Error al iniciar sesion'); return; }
      accessToken = resp.access_token;
      verificarAcceso();
    }
  });
  tokenClient.requestAccessToken({prompt: 'select_account'});
}

function verificarAcceso() {
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: {Authorization: 'Bearer ' + accessToken}
  }).then(function(r){return r.json();})
    .then(function(info) {
      var email = (info.email || '').toLowerCase();
      if (CORREOS_PERMITIDOS.indexOf(email) < 0) {
        mostrarError('Acceso denegado. Tu cuenta (' + email + ') no tiene permiso.');
        accessToken = null;
        return;
      }
      usuarioActual = info.name || info.email;
      document.getElementById('user-name').textContent = usuarioActual;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      cargarDatos();
    }).catch(function() { mostrarError('Error verificando cuenta'); });
}

function mostrarError(msg) {
  var el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function cerrarSesion() {
  accessToken = null; dbData = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-error').style.display = 'none';
}

// DATOS
async function cargarDatos() {
  document.getElementById('main-content').innerHTML = '<div class="loading">Cargando datos...</div>';
  try {
    var rows;
    if (APPS_SCRIPT_URL) {
      var r = await fetch(APPS_SCRIPT_URL + '?action=getData');
      var result = await r.json();
      rows = result.values || [];
    } else {
      var r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Base%20de%20Datos!A:BF',
        {headers: {Authorization: 'Bearer ' + accessToken}});
      rows = (await r.json()).values || [];
    }
    if (rows.length > 1) {
      dbData = rows.slice(1).map(function(row) {
        while (row.length < 57) row.push('');
        return row;
      });
    }
    poblarFiltroMes();
    renderDashboard();
  } catch(e) {
    document.getElementById('main-content').innerHTML = '<div class="loading">Error cargando datos. Intenta de nuevo.</div>';
  }
}

function poblarFiltroMes() {
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var vistos = {};
  dbData.forEach(function(r) {
    var fi = parseDate(String(getField(r, IDX.fechaIngreso)));
    if (fi) {
      var key = fi.getFullYear() + '-' + fi.getMonth();
      vistos[key] = {anio: fi.getFullYear(), mes: fi.getMonth(), label: meses[fi.getMonth()] + ' ' + fi.getFullYear()};
    }
  });
  var keys = Object.keys(vistos).sort().reverse();
  var sel = document.getElementById('f-mes');
  sel.innerHTML = '';
  keys.forEach(function(k) {
    var o = document.createElement('option');
    o.value = k;
    o.textContent = vistos[k].label;
    sel.appendChild(o);
  });
  if (keys.length > 0) {
    var first = vistos[keys[0]];
    filtroMes = first.mes;
    filtroAnio = first.anio;
  }
}

function aplicarFiltros() {
  var sel = document.getElementById('f-mes');
  if (sel.value) {
    var parts = sel.value.split('-');
    filtroAnio = parseInt(parts[0]);
    filtroMes = parseInt(parts[1]);
  }
  filtroClasif = document.getElementById('f-clasif').value;
  renderDashboard();
}

function toggleAnual() {
  mostrandoAnual = !mostrandoAnual;
  var btn = document.getElementById('btn-anual');
  btn.textContent = mostrandoAnual ? 'Ocultar Acumulado Anual' : 'Ver Acumulado Anual';
  btn.style.background = mostrandoAnual ? 'var(--rojo)' : 'var(--azul)';
  renderDashboard();
}

// FILTRAR DATOS
function filtrarDatos(mes, anio, clasif) {
  return dbData.filter(function(r) {
    if (!getField(r, IDX.noOrden)) return false;
    var fi = parseDate(String(getField(r, IDX.fechaIngreso)));
    if (!fi) return false;
    if (fi.getMonth() !== mes || fi.getFullYear() !== anio) return false;
    if (clasif && clasif !== '' && getField(r, IDX.clasificacion) !== clasif) return false;
    return true;
  });
}



// CALCULOS
function calcMetricas(mes, anio) {
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var listoTaller = ['unidad completa','mo','pend. ref. taller puede avanzar'];

  // Nuevas: fecha ingreso en el mes
  var nuevas = dbData.filter(function(r) {
    if (!getField(r, IDX.noOrden)) return false;
    var fi = parseDate(String(getField(r, IDX.fechaIngreso)||''));
    return fi && fi.getMonth()===mes && fi.getFullYear()===anio;
  });

  // Entregadas: status entregado + fecha entrega en el mes
  var entregadas = dbData.filter(function(r) {
    if (!getField(r, IDX.noOrden)) return false;
    var fe = parseDate(String(getField(r, IDX.fechaEntrega)||''));
    return String(getField(r, IDX.statusTaller)||'').toLowerCase()==='entregado'
      && fe && fe.getMonth()===mes && fe.getFullYear()===anio;
  });

  // En tiempo / retraso: todas las ordenes activas no entregadas
  var enTiempo = 0, conRetraso = 0;
  dbData.forEach(function(r) {
    if (!getField(r, IDX.noOrden)) return;
    if (String(getField(r, IDX.statusTaller)||'').toLowerCase()==='entregado') return;
    var fe = parseDate(String(getField(r, IDX.fechaEntregaCalc)||''));
    if (!fe || isNaN(fe.getTime())) return;
    var diff = Math.round((fe - hoy) / 86400000);
    if (diff < 0) conRetraso++;
    else enTiempo++;
  });

  // Tiempo promedio usando entregadas del mes
  var totalDias = 0, countDias = 0;
  entregadas.forEach(function(r) {
    var feReal = parseDate(String(getField(r, IDX.fechaEntrega)||''));
    var fi = parseDate(String(getField(r, IDX.fechaIngreso)||''));
    if (feReal && fi) { totalDias += Math.round((feReal-fi)/86400000); countDias++; }
  });

  var promDias = countDias > 0 ? Math.round(totalDias/countDias) : 0;
  var cumplimiento = (enTiempo+conRetraso) > 0 ? Math.round(enTiempo/(enTiempo+conRetraso)*100) : 0;
  return {nuevas:nuevas.length, entregadas:entregadas.length, enTiempo:enTiempo, conRetraso:conRetraso, promDias:promDias, cumplimiento:cumplimiento};
}

function calcAreaTiempos(rows) {
  var valDias = [], refDias = [], tallDias = [];
  rows.forEach(function(r) {
    var fi = parseDate(String(getField(r, IDX.fechaIngreso)));
    var fvf = parseDate(String(getField(r, IDX.fechaValFinal)));
    var fir = parseDate(String(getField(r, IDX.fechaIniRef)));
    var ffr = parseDate(String(getField(r, IDX.fechaFinRef)));
    var fe = parseDate(String(getField(r, IDX.fechaEntrega)));
    if (fi && fvf) valDias.push(Math.round((fvf - fi) / 86400000));
    if (fir && ffr) refDias.push(Math.round((ffr - fir) / 86400000));
    if (ffr && fe) tallDias.push(Math.round((fe - ffr) / 86400000));
  });
  function avg(arr) { return arr.length ? (arr.reduce(function(a,b){return a+b;},0)/arr.length).toFixed(1) : 'N/A'; }
  return {val: avg(valDias), ref: avg(refDias), tall: avg(tallDias)};
}

// BARRAS PLUGIN
var barLabel = {
  id:'barLabel',
  afterDatasetsDraw:function(chart){
    var ctx=chart.ctx;
    chart.data.datasets.forEach(function(ds,i){
      chart.getDatasetMeta(i).data.forEach(function(bar,j){
        var val=ds.data[j];if(!val)return;
        ctx.save();ctx.fillStyle='#2D3748';ctx.font='bold 9px Segoe UI';
        ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText(val,bar.x,bar.y-2);ctx.restore();
      });
    });
  }
};

var legOpts = {position:'bottom',labels:{font:{size:9},padding:6,boxWidth:10}};
var scOpts = {x:{ticks:{font:{size:9}},grid:{display:false}},y:{beginAtZero:true,ticks:{font:{size:9}}}};

function mkChart(id, config) {
  if (chartInstances[id]) { chartInstances[id].destroy(); }
  var el = document.getElementById(id);
  if (el) chartInstances[id] = new Chart(el, config);
}

// RENDER PRINCIPAL
function renderDashboard() {
  if (filtroMes === null) return;
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var rows = filtrarDatos(filtroMes, filtroAnio, filtroClasif);
  var m = calcMetricas(filtroMes, filtroAnio);
  var areas = calcAreaTiempos(rows);



  // Semanas del mes
  var semanas = [], semNuevas = [], semEntregadas = [];
  var primerDia = new Date(filtroAnio, filtroMes, 1);
  var ultimoDia = new Date(filtroAnio, filtroMes+1, 0);
  var sStart = new Date(primerDia);
  var sNum = 1;
  while (sStart <= ultimoDia) {
    var sEnd = new Date(sStart); sEnd.setDate(sStart.getDate()+6);
    if (sEnd > ultimoDia) sEnd = new Date(ultimoDia);
    semanas.push('Sem '+sNum+' ('+sStart.getDate()+'-'+sEnd.getDate()+')');
    var nv=0, en=0;
    rows.forEach(function(r){
      var fi=parseDate(String(getField(r,IDX.fechaIngreso)));
      if(fi&&fi>=sStart&&fi<=sEnd)nv++;
      var fe=parseDate(String(getField(r,IDX.fechaEntrega)));
      if(fe&&fe>=sStart&&fe<=sEnd)en++;
    });
    semNuevas.push(nv); semEntregadas.push(en);
    sStart.setDate(sStart.getDate()+7); sNum++;
  }

  // Por clasificacion
  var clasifs = ['Express','Leve','Medio','Fuerte','Severo'];
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var enTiempoCl = [], conRetrasoCl = [], countCl = [];
  clasifs.forEach(function(cl) {
    var sub = rows.filter(function(r){return getField(r,IDX.clasificacion)===cl;});
    countCl.push(sub.length);
    var et=0,cr=0;
    sub.forEach(function(r){
      var fe=parseDate(String(getField(r,IDX.fechaEntregaCalc)));
      if(!fe)return;
      var st=String(getField(r,IDX.statusTaller)).toLowerCase();
      if(st==='entregado'){var feR=parseDate(String(getField(r,IDX.fechaEntrega)));if(feR&&feR<=fe)et++;else cr++;}
      else{if(fe>=hoy)et++;else cr++;}
    });
    enTiempoCl.push(et); conRetrasoCl.push(cr);
  });

  // Anual
  var anioActual = filtroAnio;
  var anualLabels=[], anualNuevas=[], anualEntregadas=[];
  for(var m2=0;m2<=filtroMes;m2++){
    anualLabels.push(meses[m2].substring(0,3));
    var rAnual=filtrarDatos(m2,anioActual,filtroClasif);
    anualNuevas.push(rAnual.length);
    anualEntregadas.push(rAnual.filter(function(r){return String(getField(r,IDX.statusTaller)).toLowerCase()==='entregado';}).length);
  }
  var totAnualNuevas=anualNuevas.reduce(function(a,b){return a+b;},0);
  var totAnualEntregadas=anualEntregadas.reduce(function(a,b){return a+b;},0);

  // Acumulado anual metricas
  var rowsAnual=[];
  for(var mx=0;mx<=filtroMes;mx++){rowsAnual=rowsAnual.concat(filtrarDatos(mx,anioActual,''));}
  var mAnual=calcMetricas(filtroMes, filtroAnio);

  // Total clasif para anillo
  var totalCl = countCl.reduce(function(a,b){return a+b;},0);
  var pcts = countCl.map(function(c){return totalCl>0?Math.round(c/totalCl*100):0;});

  // Anillo en tiempo vs retraso
  var pctT = m.enTiempo+m.conRetraso>0 ? Math.round(m.enTiempo/(m.enTiempo+m.conRetraso)*100) : 0;
  var pctR = 100-pctT;

  // Barras areas
  var areaMax = Math.max(parseFloat(areas.val)||0, parseFloat(areas.ref)||0, parseFloat(areas.tall)||0);

  document.getElementById('main-content').innerHTML =
    ''
        '<div class="kpis">'+
      '<div class="kpi"><div class="kpi-label">Ordenes Nuevas</div><div class="kpi-value">'+m.nuevas+'</div><div class="kpi-sub">'+meses[filtroMes]+' '+filtroAnio+'</div></div>'+
      '<div class="kpi verde"><div class="kpi-label">Entregadas</div><div class="kpi-value">'+m.entregadas+'</div><div class="kpi-sub">'+(m.nuevas>0?Math.round(m.entregadas/m.nuevas*100):0)+'% de las nuevas</div></div>'+
      '<div class="kpi azul"><div class="kpi-label">Tiempo Prom. Entrega</div><div class="kpi-value">'+m.promDias+'d</div><div class="kpi-sub">Meta: 20 dias</div></div>'+
      '<div class="kpi amarillo"><div class="kpi-label">Cumplimiento Fechas</div><div class="kpi-value">'+m.cumplimiento+'%</div><div class="kpi-sub">Meta: 85%</div></div>'+
    '</div>'+

    '<div class="charts-row">'+
      '<div class="chart-card"><h4>Ordenes Nuevas vs Entregadas por Semana</h4><canvas id="c1" style="max-height:180px"></canvas></div>'+
      '<div class="chart-card"><h4>En Tiempo vs Con Retraso por Clasificacion</h4><canvas id="c2" style="max-height:180px"></canvas></div>'+
    '</div>'+
    '<div class="charts-row">'+
      '<div class="chart-card"><h4>Distribucion por Clasificacion</h4><canvas id="c3" style="max-height:200px"></canvas></div>'+
      '<div class="chart-card"><h4>Ordenes en Tiempo vs Con Retraso</h4><canvas id="c4" style="max-height:200px"></canvas></div>'+
    '</div>';

  // Renderizar charts
  if (mostrandoAnual) {
    mkChart('c-anual',{type:'bar',plugins:[barLabel],
      data:{labels:anualLabels,datasets:[
        {label:'Nuevas',data:anualNuevas,backgroundColor:'#2B6CB0',borderRadius:3},
        {label:'Entregadas',data:anualEntregadas,backgroundColor:'#276749',borderRadius:3}
      ]},
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:legOpts},scales:scOpts}
    });
  }

  mkChart('c1',{type:'bar',plugins:[barLabel],
    data:{labels:semanas,datasets:[
      {label:'Nuevas',data:semNuevas,backgroundColor:'#2B6CB0',borderRadius:3},
      {label:'Entregadas',data:semEntregadas,backgroundColor:'#276749',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:legOpts},scales:scOpts}
  });

  mkChart('c2',{type:'bar',plugins:[barLabel],
    data:{labels:clasifs,datasets:[
      {label:'En Tiempo',data:enTiempoCl,backgroundColor:'#276749',borderRadius:3},
      {label:'Con Retraso',data:conRetrasoCl,backgroundColor:'#C53030',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:legOpts},scales:scOpts}
  });

  mkChart('c3',{type:'doughnut',
    data:{labels:clasifs.map(function(c,i){return c+' '+pcts[i]+'%';}),
      datasets:[{data:countCl,backgroundColor:['#276749','#2B6CB0','#E8640A','#D69E2E','#C53030'],borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{position:'right',labels:{font:{size:10},padding:8,boxWidth:12}}},cutout:'55%'}
  });

  mkChart('c4',{type:'doughnut',
    data:{labels:['En Tiempo ('+pctT+'%)','Con Retraso ('+pctR+'%)'],
      datasets:[{data:[m.enTiempo,m.conRetraso],backgroundColor:['#276749','#C53030'],borderWidth:3,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:8,boxWidth:12}}},cutout:'60%'}
  });
}
</script>
</body>
</html>
